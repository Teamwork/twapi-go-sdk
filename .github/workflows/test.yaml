name: Test
on:
  pull_request:
  push:
    branches:
      - main

env:
  GO_VERSION: "1.26.x"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.10

  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Verify generated code is up to date
        run: |
          go generate ./...
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Generated code is out of date. Run 'go generate ./...' locally and commit the result."
            echo "Files changed or created by 'go generate':"
            git status --short
            echo
            echo "Diff:"
            git --no-pager diff
            exit 1
          fi

  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test -v  ./...
        env:
          TWAPI_SERVER: https://tw-test-eu.rafael.net.br
          TWAPI_TOKEN: ${{ secrets.TWAPI_TOKEN }}